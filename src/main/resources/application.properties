spring.application.name=Device_APIsever
spring.config.import=optional:file:.env[.properties]

# ===== Database Configuration (SQL Server) =====

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===== Hibernate / JPA =====
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# ===== Firebase =====
firebase.config-path=${FIREBASE_CONFIG_PATH}
firebase.storage-bucket=${FIREBASE_STORAGE_BUCKET}

# ===== Cloudflare R2 (S3 API) =====
r2.access-key=${R2_ACCESS_KEY}
r2.secret-key=${R2_SECRET_KEY}
r2.endpoint=${R2_ENDPOINT}
r2.public.endpoint=${R2_PUBLIC_ENDPOINT:}
r2.bucket.public=${R2_BUCKET_PUBLIC:quanlythietbi}
r2.bucket.private=${R2_BUCKET_PRIVATE:sign}
# Danh sách thư mục (prefixes)
r2.prefix.user=user
r2.prefix.products=product
r2.prefix.work=work
r2.prefix.sign=sign
r2.prefix.qrcode=QrCode

# ===== Static Resources =====
spring.mvc.static-path-pattern=/uploads/**
spring.web.resources.static-locations=file:uploads/

# ===== JWT Configuration =====
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# ===== File Upload =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ===== Email Configuration (SMTP) =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000