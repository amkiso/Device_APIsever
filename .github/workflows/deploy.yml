name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập môi trường Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build dự án bằng Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew bootJar

      - name: Chuẩn bị các file để gửi lên Server
        run: |
          mkdir -p deploy_files
          cp build/libs/*.jar deploy_files/app.jar
          # Sửa lại từ Dockerfile.prod thành Dockerfile cho đúng file bạn đang có
          cp Dockerfile deploy_files/
          cp docker-compose.yml deploy_files/

      - name: Gửi file lên server qua SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "deploy_files/*"
          # Đường dẫn thật trên Azure của bạn
          target: "/home/hoangvuxlogin/api-server"
          strip_components: 1

      - name: SSH vào server và Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/hoangvuxlogin/api-server
            docker-compose down
            docker-compose build
            docker-compose up -d
            docker image prune -f